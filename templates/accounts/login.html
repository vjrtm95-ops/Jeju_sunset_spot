<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 - 제주도 노을 맛집</title>
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body class="auth-body">
  <div class="auth-bg">
    <div class="auth-overlay"></div>
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-logo">🌅</div>
        <h1 class="auth-title">제주도 노을 맛집</h1>
        <p class="auth-subtitle">해가 지는 방향을 따라, 가장 아름다운 노을을</p>
      </div>

      {% if messages %}
      {% for message in messages %}
      <div class="alert alert-{{ message.tags }}">{{ message }}</div>
      {% endfor %}
      {% endif %}

      <form method="post" class="auth-form">
        {% csrf_token %}
        {% for field in form %}
        <div class="form-group">
          <label class="form-label">{{ field.label }}</label>
          {{ field }}
          {% if field.errors %}
          <span class="form-error">{{ field.errors.0 }}</span>
          {% endif %}
        </div>
        {% endfor %}
        <button type="submit" class="btn btn-primary btn-full">로그인</button>
      </form>

      <div class="auth-footer">
        <p>아직 계정이 없으신가요? <a href="{% url 'accounts:signup' %}" class="auth-link">회원가입</a></p>
      </div>
    </div>
  </div>
</body>
</html>
